# Machine-readable Reed-Kellogg label relationships.
#
# is_a records ontology specialization only. builds_from records constituent
# construction only. Alternatives under builds_from are separate valid input
# sets; order is not a grammar pattern and is not significant here.

version: 1

conventions:
  abstract_labels:
    - SUBJECT
    - PREDICATE
    - OBJECT_COMPLEMENT
    - ATTRIBUTE_COMPLEMENT
    - PREPOSITIONAL_PRINCIPAL
  concrete_annotation_labels:
    - SIMPLE_SUBJECT
    - COMPOUND_SUBJECT
    - SIMPLE_PREDICATE
    - COMPOUND_PREDICATE
    - SIMPLE_OBJECT_COMPLEMENT
    - COMPOUND_OBJECT_COMPLEMENT
    - SIMPLE_ATTRIBUTE_COMPLEMENT
    - COMPOUND_ATTRIBUTE_COMPLEMENT
    - SIMPLE_PREPOSITIONAL_PRINCIPAL
    - COMPOUND_PREPOSITIONAL_PRINCIPAL
  recursive_projection_labels:
    - NOUN

is_a:
  COMMON_NOUN: [NOUN]
  PROPER_NOUN: [NOUN]
  POSSESSIVE_NOUN: [NOUN]
  POSSESSIVE_PRONOUN: [PRONOUN]
  PERSONAL_PRONOUN: [PRONOUN]
  COMPOUND_PERSONAL_PRONOUN: [PERSONAL_PRONOUN]
  RELATIVE_PRONOUN: [PRONOUN]
  COMPOUND_RELATIVE_PRONOUN: [RELATIVE_PRONOUN]
  INTERROGATIVE_PRONOUN: [PRONOUN]
  TRANSITIVE_VERB: [VERB]
  INTRANSITIVE_VERB: [VERB]
  COPULA: [VERB]
  AUXILIARY_VERB: [VERB]
  DESCRIPTIVE_ADJECTIVE: [ADJECTIVE]
  DEFINITIVE_ADJECTIVE: [ADJECTIVE]
  ARTICLE: [DEFINITIVE_ADJECTIVE]
  CONJUNCTIVE_ADVERB: [ADVERB]
  COORDINATE_CONJUNCTION: [CONJUNCTION]
  SUBORDINATE_CONJUNCTION: [CONJUNCTION]
  PARTICIPLE: [VERB]
  ADJECTIVE_PARTICIPLE: [PARTICIPLE]
  NOUN_PARTICIPLE: [PARTICIPLE]
  INFINITIVE: [VERB]
  SIMPLE_SUBJECT: [SUBJECT]
  COMPOUND_SUBJECT: [SUBJECT]
  SIMPLE_PREDICATE: [PREDICATE]
  COMPOUND_PREDICATE: [PREDICATE]
  SIMPLE_OBJECT_COMPLEMENT: [OBJECT_COMPLEMENT]
  COMPOUND_OBJECT_COMPLEMENT: [OBJECT_COMPLEMENT]
  SIMPLE_ATTRIBUTE_COMPLEMENT: [ATTRIBUTE_COMPLEMENT]
  COMPOUND_ATTRIBUTE_COMPLEMENT: [ATTRIBUTE_COMPLEMENT]
  ADJECTIVE_MODIFIER: [MODIFIER]
  ADVERB_MODIFIER: [MODIFIER]
  POSSESSIVE_MODIFIER: [ADJECTIVE_MODIFIER]
  EXPLANATORY_MODIFIER: [ADJECTIVE_MODIFIER]
  SIMPLE_PREPOSITIONAL_PRINCIPAL: [PREPOSITIONAL_PRINCIPAL]
  COMPOUND_PREPOSITIONAL_PRINCIPAL: [PREPOSITIONAL_PRINCIPAL]
  INDEPENDENT_CLAUSE: [CLAUSE]
  DEPENDENT_CLAUSE: [CLAUSE]
  ADJECTIVE_CLAUSE: [DEPENDENT_CLAUSE]
  ADVERB_CLAUSE: [DEPENDENT_CLAUSE]
  NOUN_CLAUSE: [DEPENDENT_CLAUSE]
  DIRECT_ADDRESS: [INDEPENDENT_ELEMENT]
  EXPLETIVE: [INDEPENDENT_ELEMENT]
  PARENTHETICAL: [INDEPENDENT_ELEMENT]
  DECLARATIVE: [SENTENCE]
  INTERROGATIVE: [SENTENCE]
  IMPERATIVE: [SENTENCE]
  EXCLAMATORY: [SENTENCE]
  SIMPLE_SENTENCE: [SENTENCE]
  COMPLEX_SENTENCE: [SENTENCE]
  COMPOUND_SENTENCE: [SENTENCE]

builds_from:
  NOUN:
    - [PRONOUN]
    - [NOUN, ADJECTIVE]
    - [NOUN, ARTICLE]
    - [NOUN, POSSESSIVE_NOUN]
    - [NOUN, POSSESSIVE_PRONOUN]
  VERB_PHRASE:
    - [AUXILIARY_VERB, VERB]
  SIMPLE_SUBJECT:
    - [NOUN]
  COMPOUND_SUBJECT:
    - [SIMPLE_SUBJECT, CONJUNCTION, SIMPLE_SUBJECT]
  SIMPLE_PREDICATE:
    - [VERB]
    - [VERB_PHRASE]
  COMPOUND_PREDICATE:
    - [SIMPLE_PREDICATE, CONJUNCTION, SIMPLE_PREDICATE]
  SIMPLE_OBJECT_COMPLEMENT:
    - [TRANSITIVE_VERB, NOUN]
  COMPOUND_OBJECT_COMPLEMENT:
    - [SIMPLE_OBJECT_COMPLEMENT, CONJUNCTION, SIMPLE_OBJECT_COMPLEMENT]
  SIMPLE_ATTRIBUTE_COMPLEMENT:
    - [COPULA, NOUN]
    - [COPULA, ADJECTIVE]
  COMPOUND_ATTRIBUTE_COMPLEMENT:
    - [SIMPLE_ATTRIBUTE_COMPLEMENT, CONJUNCTION, SIMPLE_ATTRIBUTE_COMPLEMENT]
  OBJECTIVE_COMPLEMENT:
    - [OBJECT_COMPLEMENT, NOUN]
    - [OBJECT_COMPLEMENT, ADJECTIVE]
  INDIRECT_OBJECT:
    - [VERB, NOUN]
  ADJECTIVE_MODIFIER:
    - [ADJECTIVE]
    - [ADJECTIVE_PHRASE]
    - [ADJECTIVE_CLAUSE]
  ADVERB_MODIFIER:
    - [ADVERB]
    - [ADVERB_PHRASE]
    - [ADVERB_CLAUSE]
  POSSESSIVE_MODIFIER:
    - [POSSESSIVE_NOUN]
    - [POSSESSIVE_PRONOUN]
  EXPLANATORY_MODIFIER:
    - [NOUN]
  SIMPLE_PREPOSITIONAL_PRINCIPAL:
    - [NOUN]
  COMPOUND_PREPOSITIONAL_PRINCIPAL:
    - [SIMPLE_PREPOSITIONAL_PRINCIPAL, CONJUNCTION, SIMPLE_PREPOSITIONAL_PRINCIPAL]
  PREPOSITIONAL_PHRASE:
    - [PREPOSITION, PREPOSITIONAL_PRINCIPAL]
  ADJECTIVE_PHRASE:
    - [PREPOSITIONAL_PHRASE]
    - [INFINITIVE_PHRASE]
    - [PARTICIPLE_PHRASE]
  ADVERB_PHRASE:
    - [PREPOSITIONAL_PHRASE]
    - [INFINITIVE_PHRASE]
  INFINITIVE_PHRASE:
    - [INFINITIVE, OBJECT_COMPLEMENT, MODIFIER]
  PARTICIPLE_PHRASE:
    - [PARTICIPLE, OBJECT_COMPLEMENT, MODIFIER]
  ABSOLUTE_PHRASE:
    - [NOUN, PARTICIPLE]
  COMPOUND:
    - [CONJUNCTION]
  CLAUSE:
    - [SUBJECT, PREDICATE]
  DEPENDENT_CLAUSE:
    - [CLAUSE, SUBORDINATE_CONJUNCTION]
    - [CLAUSE, RELATIVE_PRONOUN]
    - [CLAUSE, CONJUNCTIVE_ADVERB]
  ADJECTIVE_CLAUSE:
    - [DEPENDENT_CLAUSE, ADJECTIVE_MODIFIER]
  ADVERB_CLAUSE:
    - [DEPENDENT_CLAUSE, ADVERB_MODIFIER]
  NOUN_CLAUSE:
    - [DEPENDENT_CLAUSE, NOUN]
  INDEPENDENT_ELEMENT:
    - [INTERJECTION]
    - [ABSOLUTE_PHRASE]
  DIRECT_ADDRESS:
    - [NOUN]
  EXPLETIVE:
    - [ADVERB]
  PARENTHETICAL:
    - [CLAUSE]
    - [PREPOSITIONAL_PHRASE]
    - [INFINITIVE_PHRASE]
    - [PARTICIPLE_PHRASE]
  SENTENCE:
    - [CLAUSE]
    - [INDEPENDENT_ELEMENT]
  DECLARATIVE:
    - [SENTENCE, PERIOD]
  INTERROGATIVE:
    - [SENTENCE, QUESTION_MARK]
  IMPERATIVE:
    - [SENTENCE, PERIOD]
    - [SENTENCE, EXCLAMATION_POINT]
  EXCLAMATORY:
    - [SENTENCE, EXCLAMATION_POINT]
  SIMPLE_SENTENCE:
    - [INDEPENDENT_CLAUSE]
  COMPLEX_SENTENCE:
    - [INDEPENDENT_CLAUSE, DEPENDENT_CLAUSE]
  COMPOUND_SENTENCE:
    - [INDEPENDENT_CLAUSE, COORDINATE_CONJUNCTION, INDEPENDENT_CLAUSE]
