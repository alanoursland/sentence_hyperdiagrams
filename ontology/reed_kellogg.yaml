# Reed-Kellogg Sentence Diagram Ontology
#
# Parts of Thought labels derived from Reed & Kellogg's
# "Higher Lessons in English" (1877) and "Graded Lessons in English" (1896).
#
# Each label has:
#   name:        the label identifier
#   description: what it means (prose, may informally reference other labels)
#   source:      where the definition comes from
#
# This is a dictionary, not a grammar. It does not constrain which labels
# can parent which. See planning/ontology_design.md.

# ============================================================
# Parts of Speech (leaf labels — tag the token directly)
# ============================================================

NOUN:
  description: >
    The name of anything. "Whatever you can think of as having an
    existence, whether it be a person, an animal, a place, a thing,
    or a quality, is named by a noun."
  source: Reed & Kellogg, Higher Lessons in English

COMMON_NOUN:
  description: >
    A name which belongs in common to all things of a class — cat,
    city, river. Includes collective nouns (crowd, family) and
    abstract nouns (goodness, height).
  source: Reed & Kellogg, Higher Lessons in English

PROPER_NOUN:
  description: >
    The particular name of an individual, distinguishing it from
    others of its class — Ann, Tom, May, Boston. Begins with a
    capital letter.
  source: Reed & Kellogg, Higher Lessons in English

POSSESSIVE_NOUN:
  description: >
    A noun in the possessive case, typically used as a possessive
    modifier of another noun. In Reed-Kellogg terms, the word remains
    a noun by form and case, while its use is adjectival.
  source: Reed & Kellogg, Higher Lessons in English

PRONOUN:
  description: >
    A word used for a noun. Stands in place of a noun to avoid
    repetition. Includes personal (I, you, he), relative (who, which,
    that), interrogative (who?, what?), and demonstrative (this, that).
  source: Reed & Kellogg, Higher Lessons in English

POSSESSIVE_PRONOUN:
  description: >
    A possessive pronoun. Some forms stand substantively in place of a
    noun (mine, yours); others are used adjectivally before a noun
    (my, your, his, her, its, our, their).
  source: Reed & Kellogg, Higher Lessons in English

PERSONAL_PRONOUN:
  description: >
    A pronoun that by its form denotes the speaker, the one spoken
    to, or the one spoken of. I, you, he, she, it, we, they, and
    their case forms.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_PERSONAL_PRONOUN:
  description: >
    A personal pronoun compounded with -self or -selves (myself,
    yourself, himself, themselves), used either for emphasis or to
    reflect the action back upon the actor.
  source: Reed & Kellogg, Higher Lessons in English

RELATIVE_PRONOUN:
  description: >
    A pronoun that relates to some preceding word or words (its
    antecedent) while connecting a dependent clause to the word the
    clause modifies. Who, which, that, what.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_RELATIVE_PRONOUN:
  description: >
    A relative pronoun of the form whoever, whosoever, whichever,
    whatever. The antecedent is indefinite or contained within the
    pronoun itself.
  source: Reed & Kellogg, Higher Lessons in English

INTERROGATIVE_PRONOUN:
  description: >
    A pronoun with which a question is asked. Who?, which?, what?.
  source: Reed & Kellogg, Higher Lessons in English

VERB:
  description: >
    A word that asserts action, being, or state of being. The core
    of the predicate.
  source: Reed & Kellogg, Higher Lessons in English

TRANSITIVE_VERB:
  description: >
    A verb that requires an object. The action passes over from the
    doer to the receiver. "Cornwallis surrendered his sword."
  source: Reed & Kellogg, Higher Lessons in English

INTRANSITIVE_VERB:
  description: >
    A verb that does not require an object. Asserts action complete
    in itself, or being, or state of being. "The wind blows."
  source: Reed & Kellogg, Higher Lessons in English

COPULA:
  description: >
    The asserting word that links an attribute complement to the
    subject without itself expressing the attribute — chiefly the
    verb "to be" as a mere link (is, are, was, seems, became). Reed &
    Kellogg borrow the term from logic: "the asserting word is called
    the copula — it shows that the two ideas are put together."
  source: Reed & Kellogg, Higher Lessons in English

AUXILIARY_VERB:
  description: >
    A verb that helps in the conjugation of other verbs (be, have,
    do, may, can, must, might, shall, will, and their forms). In a
    verb phrase the first auxiliary is the asserting word.
  source: Reed & Kellogg, Higher Lessons in English

ADJECTIVE:
  description: >
    A word used to modify a noun or a pronoun. Expresses quality
    (ripe, cold, beautiful), points out (the, this, that), or
    specifies number (five, some, many, all).
  source: Reed & Kellogg, Higher Lessons in English

DESCRIPTIVE_ADJECTIVE:
  description: >
    An adjective that modifies by expressing quality — ripe, cold,
    beautiful, wise.
  source: Reed & Kellogg, Higher Lessons in English

DEFINITIVE_ADJECTIVE:
  description: >
    An adjective that modifies by pointing out, numbering, or
    denoting quantity — this, that, yonder, five, some, many, all.
    Articles are definitive adjectives.
  source: Reed & Kellogg, Higher Lessons in English

ADVERB:
  description: >
    A word used to modify a verb, an adjective, or another adverb.
    Tells manner (quietly), time (now, early), place (here, there),
    or degree (very, almost, quite).
  source: Reed & Kellogg, Higher Lessons in English

CONJUNCTIVE_ADVERB:
  description: >
    An adverb that, in addition to its office as a modifier, connects
    clauses — taking the office of a conjunction upon itself. When,
    where, while, whenever, than, as; also however, therefore,
    nevertheless joining independent clauses.
  source: Reed & Kellogg, Higher Lessons in English

PREPOSITION:
  description: >
    A word that introduces a phrase modifier, showing the relation
    of a noun or pronoun to some other word. Examples: of, to, at,
    by, in, on, from, with, for.
  source: Reed & Kellogg, Higher Lessons in English

CONJUNCTION:
  description: >
    A word used to connect words, phrases, or clauses. Coordinating
    (and, but, or) or subordinating (if, when, because, that).
  source: Reed & Kellogg, Higher Lessons in English

COORDINATE_CONJUNCTION:
  description: >
    A conjunction that connects words, phrases, or clauses of the
    same rank. Reed & Kellogg divide them into copulative (and, both
    ... and), adversative (but, whereas), and alternative (or, nor,
    either ... or, neither ... nor). Paired forms are called
    correlatives.
  source: Reed & Kellogg, Higher Lessons in English

SUBORDINATE_CONJUNCTION:
  description: >
    A conjunction that connects clauses of different rank —
    introducing a dependent clause. If, because, that, though,
    unless, lest, whether.
  source: Reed & Kellogg, Higher Lessons in English

INTERJECTION:
  description: >
    A word used to express strong or sudden feeling. Grammatically
    independent of the sentence. Examples: Oh!, Ah!, Alas!
  source: Reed & Kellogg, Higher Lessons in English

ARTICLE:
  description: >
    A determiner that specifies definiteness. "The" (definite) or
    "a"/"an" (indefinite). Reed & Kellogg classify these as
    adjectives, but they are distinguished here for annotation
    clarity.
  source: Reed & Kellogg (classified under adjective)

# ============================================================
# Verbals (participles and infinitives)
# ============================================================
#
# Reed & Kellogg treat the participle and the infinitive as the two
# non-asserting forms of the verb. They deliberately reject the term
# "gerund": nounal -ing forms are participles used as nouns.

PARTICIPLE:
  description: >
    A form of the verb partaking of the nature of an adjective or of
    a noun, expressing the action or being as assumed, not asserted.
    Commonly ends in -ing, -ed, or -en. Like other verb forms it may
    take an object and adverb modifiers.
  source: Reed & Kellogg, Higher Lessons in English

ADJECTIVE_PARTICIPLE:
  description: >
    A participle used as an adjective modifier, sharing the nature of
    the verb and that of the adjective. "Hearing the noise, the boy
    turned." When the verbal nature is wholly lost ("singing birds")
    the word is a mere adjective.
  source: Reed & Kellogg, Higher Lessons in English

NOUN_PARTICIPLE:
  description: >
    A participle used as a noun, naming the action — "The singing of
    the birds delights us." May take adjective modifiers and a
    possessive, yet keep its object. What other grammars call the
    gerund or verbal noun; Reed & Kellogg argue at length for keeping
    the name participle.
  source: Reed & Kellogg, Higher Lessons in English

INFINITIVE:
  description: >
    A form of the verb which names the action or being in a general
    way, without asserting it of anything. Usually introduced by
    "to"; the "to" is omitted after bid, dare, feel, hear, let, make,
    need, and see. Used as a noun, an adjective, or an adverb.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Sentence elements (linking labels — connect other labels)
# ============================================================

SUBJECT:
  description: >
    Names that of which something is thought. The subject with all
    its modifiers is the modified (or logical) subject. In this
    ontology, SUBJECT is the general Reed-Kellogg concept; concrete
    annotation may use SIMPLE_SUBJECT or COMPOUND_SUBJECT.
  source: Reed & Kellogg, Higher Lessons in English

SIMPLE_SUBJECT:
  description: >
    A subject consisting of one subject head, with any attached
    modifiers included in the subject constituent. This is the
    non-compound case of the Reed-Kellogg subject.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_SUBJECT:
  description: >
    A subject made of two or more subject elements of equal rank,
    connected by a conjunction expressed or understood. This is the
    subject-specific form of Reed-Kellogg's compound construction.
  source: Reed & Kellogg, Higher Lessons in English

PREDICATE:
  description: >
    Tells what is thought of the subject. The predicate with all
    its modifiers and complements is the modified (or logical)
    predicate. In this ontology, PREDICATE is the general
    Reed-Kellogg concept; concrete annotation may use
    SIMPLE_PREDICATE or COMPOUND_PREDICATE.
  source: Reed & Kellogg, Higher Lessons in English

SIMPLE_PREDICATE:
  description: >
    A predicate consisting of one predicate verb or verb phrase,
    with any attached modifiers and complements included in the
    predicate constituent. This is the non-compound case of the
    Reed-Kellogg predicate.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_PREDICATE:
  description: >
    A predicate made of two or more predicate elements of equal
    rank, connected by a conjunction expressed or understood,
    sharing one subject. This is the predicate-specific form of
    Reed-Kellogg's compound construction.
  source: Reed & Kellogg, Higher Lessons in English

OBJECT_COMPLEMENT:
  description: >
    Completes the predicate and names the receiver of the act.
    What modern grammar calls the direct object. "Whatever fills
    out, or completes, is a Complement." In this ontology,
    OBJECT_COMPLEMENT is the general Reed-Kellogg concept; concrete
    annotation may use SIMPLE_OBJECT_COMPLEMENT or
    COMPOUND_OBJECT_COMPLEMENT.
  source: Reed & Kellogg, Higher Lessons in English

SIMPLE_OBJECT_COMPLEMENT:
  description: >
    An object complement consisting of one complement head, with any
    attached modifiers included in the complement constituent. This
    is the non-compound case of the Reed-Kellogg object complement.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_OBJECT_COMPLEMENT:
  description: >
    An object complement made of two or more object-complement
    elements of equal rank, connected by a conjunction expressed or
    understood. This is the object-complement-specific form of
    Reed-Kellogg's compound construction.
  source: Reed & Kellogg, Higher Lessons in English

ATTRIBUTE_COMPLEMENT:
  description: >
    Completes the predicate and presents a quality or class
    asserted of the subject. Follows a linking verb (is, seems,
    became). Includes what modern grammar calls the predicate
    nominative (noun) and predicate adjective (adjective). In this
    ontology, ATTRIBUTE_COMPLEMENT is the general Reed-Kellogg
    concept; concrete annotation may use SIMPLE_ATTRIBUTE_COMPLEMENT
    or COMPOUND_ATTRIBUTE_COMPLEMENT.
  source: Reed & Kellogg, Higher Lessons in English

SIMPLE_ATTRIBUTE_COMPLEMENT:
  description: >
    An attribute complement consisting of one complement head, with
    any attached modifiers included in the complement constituent.
    This is the non-compound case of the Reed-Kellogg attribute
    complement.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_ATTRIBUTE_COMPLEMENT:
  description: >
    An attribute complement made of two or more attribute elements
    of equal rank, connected by a conjunction expressed or
    understood. This is the attribute-complement-specific form of
    Reed-Kellogg's compound construction.
  source: Reed & Kellogg, Higher Lessons in English

OBJECTIVE_COMPLEMENT:
  description: >
    Completes the predicate and belongs to the object complement.
    Describes the result of the action on the object. "They crowned
    him king" — king is the objective complement of him.
  source: Reed & Kellogg, Higher Lessons in English

INDIRECT_OBJECT:
  description: >
    Names the person or thing to or for whom the action is done.
    "Give me the book" — me is the indirect object. Precedes the
    direct object without a preposition.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Modifiers (linking labels)
# ============================================================

MODIFIER:
  description: >
    A word or group of words joined to some part of the sentence
    to qualify or limit its meaning.
  source: Reed & Kellogg, Higher Lessons in English

ADJECTIVE_MODIFIER:
  description: >
    A modifier that functions as an adjective — modifies a noun
    or pronoun. May be a single adjective, a phrase, or a clause.
  source: Reed & Kellogg, Higher Lessons in English

ADVERB_MODIFIER:
  description: >
    A modifier that functions as an adverb — modifies a verb,
    adjective, or another adverb. May be a single adverb, a phrase,
    or a clause.
  source: Reed & Kellogg, Higher Lessons in English

POSSESSIVE_MODIFIER:
  description: >
    A noun or pronoun in the possessive case used as an adjective
    modifier of another noun — "Solomon's temple." One of Reed &
    Kellogg's two kinds of noun modifiers (the other being the
    explanatory modifier). The word remains a noun; its use is
    adjectival.
  source: Reed & Kellogg, Higher Lessons in English

EXPLANATORY_MODIFIER:
  description: >
    A noun modifier that identifies or explains by adding another
    name of the same thing — "Dom Pedro, the emperor." Often called
    an appositive. May be introduced by as, namely, to wit, that is.
    Diagrammed in curves beside the word it explains.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Phrases (linking labels)
# ============================================================

PREPOSITIONAL_PHRASE:
  description: >
    A group of related words introduced by a preposition. Contains
    the preposition, its object (a noun or pronoun), and any
    modifiers of that object. Functions as either an adjective
    phrase or an adverb phrase.
  source: Reed & Kellogg, Higher Lessons in English

PREPOSITIONAL_PRINCIPAL:
  description: >
    The principal word or principal constituent of a prepositional
    phrase. Reed-Kellogg describes the preposition as introducing
    the phrase and the following noun or pronoun as the principal
    word of the phrase. In this ontology, PREPOSITIONAL_PRINCIPAL is
    the general concept; concrete annotation may use
    SIMPLE_PREPOSITIONAL_PRINCIPAL or COMPOUND_PREPOSITIONAL_PRINCIPAL.
  source: Reed & Kellogg, Higher Lessons in English

SIMPLE_PREPOSITIONAL_PRINCIPAL:
  description: >
    A prepositional principal consisting of one principal head, with
    any attached modifiers included in the constituent. This is the
    non-compound case of the principal word in a prepositional phrase.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_PREPOSITIONAL_PRINCIPAL:
  description: >
    A prepositional principal made of two or more principal elements
    of equal rank, connected by a conjunction expressed or understood.
    This is the prepositional-principal-specific form of Reed-Kellogg's
    compound construction.
  source: Reed & Kellogg, Higher Lessons in English

VERB_PHRASE:
  description: >
    Two or more words that together do the work of a single verb.
    The auxiliary verb(s) plus the main verb. "Is learning,"
    "may be learned," "could have been learning."
  source: Reed & Kellogg, Higher Lessons in English

ADJECTIVE_PHRASE:
  description: >
    A phrase doing the office of an adjective — modifying a noun or
    pronoun. Usually a prepositional phrase ("the house on the
    hill"), but infinitive and participle phrases also serve.
  source: Reed & Kellogg, Higher Lessons in English

ADVERB_PHRASE:
  description: >
    A phrase doing the office of an adverb — modifying a verb, an
    adjective, or an adverb. Usually a prepositional phrase ("sat by
    the fire"), but infinitive phrases also serve.
  source: Reed & Kellogg, Higher Lessons in English

INFINITIVE_PHRASE:
  description: >
    An infinitive with its complements and modifiers. Used as a
    noun (subject, complement, or object), as an adjective, as an
    adverb, or independently — "To make a long story short, ..."
  source: Reed & Kellogg, Higher Lessons in English

PARTICIPLE_PHRASE:
  description: >
    A participle with its complements and modifiers. Serves an
    adjectival office ("the boy, hearing the noise, turned") or a
    nounal office ("fond of asking questions"). Reed & Kellogg's
    term for what is now usually called a participial phrase.
  source: Reed & Kellogg, Higher Lessons in English

ABSOLUTE_PHRASE:
  description: >
    A noun or pronoun used independently with a modifying participle
    — "His master being absent, the business was neglected." It
    logically modifies the predicate but has no grammatical
    connective, and so is grammatically independent (the nominative
    absolute).
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Compound structures (linking labels)
# ============================================================

COMPOUND:
  description: >
    Two or more elements of the same kind connected by a
    conjunction (expressed or understood). Applies to compound
    subjects, compound predicates, compound complements, and
    compound phrases.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Clauses (linking labels)
# ============================================================

CLAUSE:
  description: >
    A part of a sentence containing a subject and a predicate.
  source: Reed & Kellogg, Higher Lessons in English

INDEPENDENT_CLAUSE:
  description: >
    A clause not dependent on another clause. Can stand alone as
    a sentence.
  source: Reed & Kellogg, Higher Lessons in English

DEPENDENT_CLAUSE:
  description: >
    A clause used as an adjective, an adverb, or a noun. Cannot
    stand alone as a sentence.
  source: Reed & Kellogg, Higher Lessons in English

ADJECTIVE_CLAUSE:
  description: >
    A dependent clause doing the office of an adjective — modifying
    a noun or pronoun. Connected by a relative pronoun (who, which,
    that) or a conjunctive adverb (when, where, why). "The man that
    is discreet."
  source: Reed & Kellogg, Higher Lessons in English

ADVERB_CLAUSE:
  description: >
    A dependent clause doing the work of an adverb. Reed & Kellogg
    classify adverb clauses by meaning: time, place, degree, manner,
    real cause, evidence, purpose, condition, and concession.
  source: Reed & Kellogg, Higher Lessons in English

NOUN_CLAUSE:
  description: >
    A dependent clause doing the office of a noun — as subject,
    complement, object of a preposition, or explanatory modifier.
    Introduced by that, if, whether, or by question words (what,
    who, how, when, where, why).
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Independent elements (linking labels)
# ============================================================
#
# Words and phrases that have no grammatical connection with the
# rest of the sentence (Higher Lessons, Lesson 44). In the diagram
# an independent element stands by itself.

INDEPENDENT_ELEMENT:
  description: >
    A word or phrase used with no grammatical connection to the rest
    of the sentence. Reed & Kellogg's cases: independent by address,
    by exclamation ("Poor man! he never came back"), by pleonasm
    ("Thy rod and thy staff, they comfort me"), the absolute phrase,
    independent infinitive and participle phrases ("to confess the
    truth," "generally speaking"), independent adverbs (well, now,
    why), interjections, and parenthetical matter.
  source: Reed & Kellogg, Higher Lessons in English

DIRECT_ADDRESS:
  description: >
    A noun or pronoun independent by address — naming the person or
    thing spoken to, serving only to arrest attention. "The fault,
    dear Brutus, is not in our stars." Also called the nominative of
    address.
  source: Reed & Kellogg, Higher Lessons in English

EXPLETIVE:
  description: >
    An idiomatic word used merely to throw the subject after the
    verb, the ordinary meaning having faded out — chiefly "there" in
    "There are pitch-pine Yankees and white-pine Yankees." Diagrammed
    standing by itself, apart from the sentence line.
  source: Reed & Kellogg, Higher Lessons in English

PARENTHETICAL:
  description: >
    An expression enclosed within marks of parenthesis (or set off
    by dashes or commas) that is independent of the rest of the
    sentence — "I stake my fame (and I had fame) upon this cast."
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Sentence types (linking labels)
# ============================================================

SENTENCE:
  description: >
    The expression of a thought in words.
  source: Reed & Kellogg, Higher Lessons in English

DECLARATIVE:
  description: >
    A sentence used to affirm or to deny.
  source: Reed & Kellogg, Higher Lessons in English

INTERROGATIVE:
  description: >
    A sentence that expresses a question.
  source: Reed & Kellogg, Higher Lessons in English

IMPERATIVE:
  description: >
    A sentence that expresses a command or a request.
  source: Reed & Kellogg, Higher Lessons in English

EXCLAMATORY:
  description: >
    A sentence that expresses sudden thought or strong feeling.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Sentence complexity (linking labels)
# ============================================================

SIMPLE_SENTENCE:
  description: >
    A sentence that contains but one subject and one predicate,
    either or both of which may be compound.
  source: Reed & Kellogg, Higher Lessons in English

COMPLEX_SENTENCE:
  description: >
    A sentence composed of an independent clause and one or more
    dependent clauses.
  source: Reed & Kellogg, Higher Lessons in English

COMPOUND_SENTENCE:
  description: >
    A sentence composed of two or more independent clauses.
  source: Reed & Kellogg, Higher Lessons in English

# ============================================================
# Punctuation (leaf labels)
# ============================================================

PERIOD:
  description: >
    A "."
  source: General convention

COMMA:
  description: >
    A ","
  source: General convention

QUESTION_MARK:
  description: >
    A "?"
  source: General convention

EXCLAMATION_POINT:
  description: >
    A "!"
  source: General convention

SEMICOLON:
  description: >
    A ";"
  source: General convention

COLON:
  description: >
    A ":"
  source: General convention

DOUBLE_QUOTE:
  description: >
    A "\""
  source: General convention

SINGLE_QUOTE:
  description: >
    A "'"
  source: General convention
