# Reed-Kellogg primitive structure transform
#
# This file defines the next annotation layer after POS. The pass name is
# "primitives" because these labels are below full sentence elements such as
# SUBJECT and PREDICATE. They are the first structural constituents built from
# POS labels.
#
# This is a rule proposal file, not executable code yet. The pattern language
# is intentionally small and right-to-left:
#
#   RULES RUN LEFT TO RIGHT OVER TOKENS.
#   EACH PATTERN MATCHES RIGHT TO LEFT FROM THE CURRENT TOKEN.
#
#   LABEL                 match a label
#   "token"               match a literal token, without requiring a POS label
#   A|B                   match either single label/token atom
#   (...)                 group alternatives
#   ?                     optional previous atom/group
#   @ATOM                 capture this match as child_prev
#   BOF                   virtual beginning-of-file sentinel at index -1
#
# Matching a built label consumes the full span of that label. For example,
# SIMPLE_SUBJECT NOUN ARTICLE 3 attached to token 4 covers tokens 3..4; a
# later rule matching SIMPLE_SUBJECT on token 4 resumes scanning before token 3.
#
# If a rule emits a linking label, the final/current matched label supplies
# child_curr and the last successful @ capture supplies child_prev/index_prev.
# If no @ capture succeeds, the emitted label is a leaf label.
#
# Literal punctuation is preferred in patterns so the rule language does not
# depend on punctuation POS labels. For now the primitive subject rules treat
# ".", "?", and "!" as sentence-start evidence for the following token. A future
# engine can distinguish terminal periods from abbreviation periods before these
# patterns are trusted on broader text.

pass: primitives
ontology: reed_kellogg
input_passes:
  - pos
output_pass: primitives

labels:
  - SIMPLE_SUBJECT
  - COMPOUND_SUBJECT
  - SIMPLE_OBJECT_COMPLEMENT
  - COMPOUND_OBJECT_COMPLEMENT
  - SIMPLE_PREPOSITIONAL_PRINCIPAL
  - COMPOUND_PREPOSITIONAL_PRINCIPAL

rules:
  # A sentence-initial noun/pronoun forms a simple subject, with an optional
  # article or adjective-style modifier captured when present. If neither
  # optional capture matches, the emitted SIMPLE_SUBJECT is a leaf label.
  #
  # Example:
  #   0 A
  #     ARTICLE
  #   1 cat
  #     NOUN
  #     SIMPLE_SUBJECT NOUN ARTICLE 0
  - emit: SIMPLE_SUBJECT
    pattern: '(BOF|"."|"?"|"!") (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # Bare example:
  #   24 Ann
  #     NOUN
  #     SIMPLE_SUBJECT

  # A noun/pronoun after a conjunction can be another simple subject when the
  # left side is already a simple subject. An optional article or
  # adjective-style modifier is captured when present.
  #
  # Example:
  #   1 cat
  #     SIMPLE_SUBJECT NOUN ARTICLE 0
  #   2 and
  #     CONJUNCTION
  #   3 a
  #     ARTICLE
  #   4 rat
  #     NOUN
  #     SIMPLE_SUBJECT NOUN ARTICLE 3
  - emit: SIMPLE_SUBJECT
    pattern: 'SIMPLE_SUBJECT CONJUNCTION (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # A second subject after a conjunction forms a compound subject with the
  # previous subject. Because label matching consumes spans, the rightmost
  # SIMPLE_SUBJECT may already include its article.
  #
  # Example:
  #   1 cat
  #     SIMPLE_SUBJECT NOUN ARTICLE 0
  #   2 and
  #     CONJUNCTION
  #   4 rat
  #     SIMPLE_SUBJECT NOUN ARTICLE 3
  #     COMPOUND_SUBJECT SIMPLE_SUBJECT SIMPLE_SUBJECT 1
  - emit: COMPOUND_SUBJECT
    pattern: '@SIMPLE_SUBJECT CONJUNCTION SIMPLE_SUBJECT'

  # A noun/pronoun after a verb or verb phrase forms a simple object
  # complement, with an optional article captured when present.
  #
  # Example:
  #   14 has
  #     VERB
  #   15 a
  #     ARTICLE
  #   16 rat
  #     NOUN
  #     SIMPLE_OBJECT_COMPLEMENT NOUN ARTICLE 15
  - emit: SIMPLE_OBJECT_COMPLEMENT
    pattern: '(VERB|VERB_PHRASE) (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # A noun/pronoun after a conjunction can be another simple object
  # complement when the left side is already a simple object complement.
  - emit: SIMPLE_OBJECT_COMPLEMENT
    pattern: 'SIMPLE_OBJECT_COMPLEMENT CONJUNCTION (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # A second object complement after a conjunction forms a compound object
  # complement with the previous object complement.
  - emit: COMPOUND_OBJECT_COMPLEMENT
    pattern: '@SIMPLE_OBJECT_COMPLEMENT CONJUNCTION SIMPLE_OBJECT_COMPLEMENT'

  # A noun/pronoun after a preposition forms the simple principal of a
  # prepositional phrase, with an optional article captured when present.
  #
  # Example:
  #   21 at
  #     PREPOSITION
  #   22 Ann
  #     NOUN
  #     SIMPLE_PREPOSITIONAL_PRINCIPAL
  - emit: SIMPLE_PREPOSITIONAL_PRINCIPAL
    pattern: 'PREPOSITION (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # A noun/pronoun after a conjunction can be another simple prepositional
  # principal when the left side is already a simple prepositional principal.
  - emit: SIMPLE_PREPOSITIONAL_PRINCIPAL
    pattern: 'SIMPLE_PREPOSITIONAL_PRINCIPAL CONJUNCTION (@ADJECTIVE | @ARTICLE)? (NOUN|PRONOUN)'

  # A second prepositional principal after a conjunction forms a compound
  # prepositional principal with the previous prepositional principal.
  - emit: COMPOUND_PREPOSITIONAL_PRINCIPAL
    pattern: '@SIMPLE_PREPOSITIONAL_PRINCIPAL CONJUNCTION SIMPLE_PREPOSITIONAL_PRINCIPAL'
